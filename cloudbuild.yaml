# ═══════════════════════════════════════════════════════════════
# Google Cloud Build Configuration
# لبناء ونشر تطبيق Mahwous Smart Pricing تلقائياً
# ═══════════════════════════════════════════════════════════════

steps:
  # الخطوة 1: بناء صورة Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mahwous-smart-pricing:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mahwous-smart-pricing:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    waitFor: ['-']

  # الخطوة 2: دفع الصورة إلى Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mahwous-smart-pricing:$SHORT_SHA'
    waitFor: ['build-image']

  # الخطوة 3: نشر على Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-cloud-run'
    args:
      - run
      - deploy
      - mahwous-smart-pricing
      - '--image=gcr.io/$PROJECT_ID/mahwous-smart-pricing:$SHORT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--allow-unauthenticated'
      - '--set-env-vars=STREAMLIT_SERVER_HEADLESS=true,STREAMLIT_BROWSER_GATHER_USAGE_STATS=false'
    waitFor: ['push-image']

# الصور التي سيتم حفظها
images:
  - 'gcr.io/$PROJECT_ID/mahwous-smart-pricing:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mahwous-smart-pricing:latest'

# المدة القصوى للبناء (بالثواني)
timeout: '3600s'

# خيارات البناء
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
# المتغيرات المستبدلة
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'mahwous-smart-pricing'

# الشروط التي تُفعّل البناء
# يمكن تفعيل هذا من Cloud Build Triggers
